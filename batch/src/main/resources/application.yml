spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: payment
    password: payment1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  batch:
    job:
      enabled: false  # 앱 시작 시 자동 실행 방지 (스케줄러가 제어)
    jdbc:
      initialize-schema: always  # Spring Batch 메타 테이블 자동 생성
